server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: movie-review-system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:movie}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&autoReconnect=true&connectTimeout=30000&socketTimeout=60000
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    hikari:
      initialization-fail-timeout: 60000
      connection-timeout: 30000
      minimum-idle: 1
      maximum-pool-size: 2
      connection-test-query: SELECT 1

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.example.movie: debug
    com.zaxxer.hikari: trace
    org.springframework.jdbc: debug

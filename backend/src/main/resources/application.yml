spring:
  application:
    name: movie-review-system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:dpshmy-nsoibg00vy6m3nxv-pub.proxy.dms.aliyuncs.com}:${DB_PORT:3306}/${DB_NAME:movie}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=10000&socketTimeout=30000
    username: ${DB_USERNAME:uQ0sgL2iNbfkEirFiDrsqOZo}
    password: ${DB_PASSWORD:P71JlvldMkny8yqZ3DUOt0msOqB7JC}
    hikari:
      # ===== 性能优化配置（潘玺名，2025-07-08）=====
      # 预建 5 个空闲连接，避免首次请求等待连接建立
      minimum-idle: 5
      # 最大 20 个并发连接，应对高并发场景
      maximum-pool-size: 20
      # 连接超时 10 秒（防止无限等待）
      connection-timeout: 10000
      # 连接最大存活时间 20 分钟
      max-lifetime: 1200000
      # 空闲连接超时 5 分钟
      idle-timeout: 300000
      # 启动时强制初始化连接池（10 秒超时），避免首页首次请求 500 错误
      # 设为正数后，HikariCP 会在应用启动时预建 minimum-idle 个连接
      initialization-fail-timeout: 10000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.example.movie: debug
    com.zaxxer.hikari: trace
    org.springframework.jdbc: debug

